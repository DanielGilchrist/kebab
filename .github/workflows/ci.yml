name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - run: crystal tool format --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/shards
            lib
            bin
          key: shards-${{ runner.os }}-${{ hashFiles('shard.yml') }}
          restore-keys: |
            shards-${{ runner.os }}-
      - run: shards install
      - run: ./bin/ameba

  spec:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        crystal: ["1.20.0", latest, nightly]
        include:
          - { os: macos-latest, crystal: latest }

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.crystal == 'nightly' }}

    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Run specs
        run: crystal spec spec
